<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 1 - Alimentación Saludable</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(rgba(15,23,42,0.9), rgba(30,41,59,0.95)),
      url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1920&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1100px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:40px;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      text-align:center;
      font-size:2.8rem;
      margin-bottom:10px;
    }

    .jugador{
      text-align:center;
      margin-bottom:15px;
      color:#cbd5e1;
      font-size:1.2rem;
    }

    .cronometro{
      text-align:center;
      font-size:1.4rem;
      margin-bottom:35px;
      color:#93c5fd;
      font-weight:bold;
    }

    .subtitulo{
      text-align:center;
      margin-bottom:35px;
      color:#dbeafe;
      font-size:1.1rem;
    }

    .bloque{
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      padding:25px;
      margin-bottom:25px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .bloque h2{
      margin-bottom:20px;
      color:#93c5fd;
      font-size:1.8rem;
    }

    .opciones{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    label{
      background:rgba(255,255,255,0.08);
      padding:15px;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      gap:12px;
      font-size:1.05rem;
    }

    label:hover{
      background:rgba(255,255,255,0.15);
      transform:translateX(5px);
    }

    input[type="checkbox"]{
      transform:scale(1.3);
      cursor:pointer;
    }

    .acciones{
      margin-top:35px;
      text-align:center;
    }

    button{
      padding:16px 45px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(37,99,235,0.5);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 25px rgba(37,99,235,0.7);
    }

    /* MODAL */

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-contenido{
      width:90%;
      max-width:500px;
      background:#0f172a;
      padding:40px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      animation:modalShow 0.5s ease;
    }

    @keyframes modalShow{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .modal h2{
      font-size:2rem;
      margin-bottom:20px;
      color:#93c5fd;
    }

    .modal p{
      font-size:1.2rem;
      margin-bottom:30px;
      line-height:1.7;
      color:#e2e8f0;
    }

    @media(max-width:800px){

      .opciones{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Alimentación Saludable</h1>

    <div class="jugador" id="jugador"></div>

    <div class="cronometro" id="cronometro">
      Tiempo: 00:00
    </div>

    <div class="subtitulo">
      Selecciona todas las opciones saludables en cada categoría.
    </div>

    <!-- PLATO PRINCIPAL -->

    <div class="bloque">

      <h2>🍽 Plato Principal</h2>

      <div class="opciones">

        <label>
          <input type="checkbox" class="correcta">
          Pechuga de pollo/pescado/carne grillada o al horno
        </label>

        <label>
          <input type="checkbox" class="correcta">
          Tarta casera de verduras
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Milanesa frita
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Hamburguesa o sándwich jyq
        </label>

      </div>

    </div>

    <!-- ACOMPAÑAMIENTO -->

    <div class="bloque">

      <h2>🥗 Acompañamiento</h2>

      <div class="opciones">

        <label>
          <input type="checkbox" class="correcta">
          Ensalada mixta
        </label>

        <label>
          <input type="checkbox" class="correcta">
          Arroz integral
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Papas fritas/noisette
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Puré instantáneo
        </label>

      </div>

    </div>

    <!-- BEBIDA -->

    <div class="bloque">

      <h2>🥤 Bebida</h2>

      <div class="opciones">

        <label>
          <input type="checkbox" class="correcta">
          Agua/soda
        </label>

        <label>
          <input type="checkbox" class="correcta">
          Agua saborizada sin azúcar
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Gaseosa común
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Bebida energizante
        </label>

      </div>

    </div>

    <!-- POSTRE -->

    <div class="bloque">

      <h2>🍎 Postre</h2>

      <div class="opciones">

        <label>
          <input type="checkbox" class="correcta">
          Fruta fresca
        </label>

        <label>
          <input type="checkbox" class="correcta">
          Yogur natural
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Postrecito industrial
        </label>

        <label>
          <input type="checkbox" class="incorrecta">
          Alfajor
        </label>

      </div>

    </div>

    <div class="acciones">

      <button onclick="evaluar()">
        ENVIAR RESPUESTAS
      </button>

    </div>

  </div>

  <!-- MODAL -->

  <div class="modal" id="modal">

    <div class="modal-contenido">

      <h2>Resultado</h2>

      <p id="mensaje"></p>

      <button onclick="continuar()">
        SIGUIENTE
      </button>

    </div>

  </div>

  <script>

    // MOSTRAR JUGADOR

    const nombre = localStorage.getItem("jugador");

    if(nombre){

      document.getElementById("jugador").innerHTML =
      "Jugador: <strong>" + nombre + "</strong>";

    }

    // INICIALIZAR PUNTAJE

    if(localStorage.getItem("puntaje") === null){

      localStorage.setItem("puntaje", 0);

    }

    // EVALUAR RESPUESTAS

    function evaluar(){

      let puntos = 0;

      // TODAS LAS OPCIONES CORRECTAS MARCADAS

      const correctas =
      document.querySelectorAll(".correcta");

      correctas.forEach(function(item){

        if(item.checked){

          puntos++;

        }

      });

      // RESTAR SI MARCA OPCIONES INCORRECTAS

      const incorrectas =
      document.querySelectorAll(".incorrecta");

      incorrectas.forEach(function(item){

        if(item.checked){

          puntos--;

        }

      });

      // EVITAR PUNTAJE NEGATIVO

      if(puntos < 0){

        puntos = 0;

      }

      // OBTENER PUNTAJE TOTAL

      let total =
      parseInt(localStorage.getItem("puntaje"));

      total += puntos;

      // GUARDAR

      localStorage.setItem("puntaje", total);

      // MOSTRAR MODAL

      document.getElementById("modal").style.display =
      "flex";

      document.getElementById("mensaje").innerHTML =
      "Usted obtuvo <strong>" + puntos +
      "</strong> puntos en esta actividad.<br><br>" +
      "Puntaje acumulado: <strong>" +
      total + "</strong>";

    }

    // CONTINUAR

    function continuar(){

      window.location.href = "final.html";

    }

    // =========================
    // CRONOMETRO GLOBAL
    // =========================

    function actualizarCronometro(){

      const inicio =
      localStorage.getItem("inicioTiempo");

      if(!inicio) return;

      Math.floor((ahora - inicio) / 1000);

      const minutos = Math.floor(transcurrido / 60)
      .toString()
      .padStart(2, "0");

      const segundos = (transcurrido % 60)
      .toString()
      .padStart(2, "0");

      document.getElementById("cronometro").innerHTML =
      "Tiempo: " + minutos + ":" + segundos;

    }

    actualizarCronometro();

    setInterval(actualizarCronometro, 1000);

  </script>

</body>
</html>
