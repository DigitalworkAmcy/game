<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 1</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(rgba(15,23,42,0.9), rgba(30,41,59,0.95)),
      url('https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1920&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1200px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:40px;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      text-align:center;
      font-size:3rem;
      margin-bottom:10px;
      color:#ffffff;
    }

    .jugador{
      text-align:center;
      margin-bottom:15px;
      color:#cbd5e1;
      font-size:1.2rem;
    }

    .cronometro{
      text-align:center;
      font-size:1.4rem;
      margin-bottom:35px;
      color:#93c5fd;
      font-weight:bold;
    }

    .contenido{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:50px;
      align-items:center;
    }

    /* OPCIONES */

    .opciones{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .card-opcion{
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      padding:25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.1);
    }

    .card-opcion:hover{
      transform:translateX(5px);
      background:rgba(255,255,255,0.12);
    }

    .animal{
      font-size:1.5rem;
      font-weight:bold;
    }

    select{
      width:180px;
      padding:12px;
      border:none;
      border-radius:12px;
      font-size:1rem;
      outline:none;
      background:white;
      font-weight:bold;
    }

    /* IMAGENES */

    .imagenes{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .imagen-card{
      display:flex;
      align-items:center;
      gap:20px;
      background:rgba(255,255,255,0.08);
      padding:15px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.1);
      transition:0.3s;
    }

    .imagen-card:hover{
      transform:scale(1.02);
    }

    .imagen-card img{
      width:160px;
      height:110px;
      object-fit:cover;
      border-radius:15px;
      border:3px solid rgba(255,255,255,0.2);
    }

    .img-text{
      font-size:1.2rem;
      color:#dbeafe;
      font-weight:bold;
    }

    /* BOTON */

    .acciones{
      margin-top:40px;
      text-align:center;
    }

    button{
      padding:16px 45px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(37,99,235,0.5);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 25px rgba(37,99,235,0.7);
    }

    /* MODAL */

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .modal-contenido{
      width:90%;
      max-width:500px;
      background:#0f172a;
      padding:40px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      animation:modalShow 0.5s ease;
    }

    @keyframes modalShow{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .modal h2{
      font-size:2rem;
      margin-bottom:20px;
      color:#93c5fd;
    }

    .modal p{
      font-size:1.2rem;
      margin-bottom:30px;
      line-height:1.6;
      color:#e2e8f0;
    }

    @media(max-width:900px){

      .contenido{
        grid-template-columns:1fr;
      }

      .imagen-card{
        flex-direction:column;
        text-align:center;
      }

      .card-opcion{
        flex-direction:column;
        gap:15px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Relaciona Correctamente</h1>

    <div class="jugador" id="jugador"></div>

    <div class="cronometro" id="cronometro">
      Tiempo: 00:00
    </div>

    <div class="contenido">

      <!-- OPCIONES -->

      <div class="opciones">

        <div class="card-opcion">

          <div class="animal">🐶 Perro</div>

          <select id="r1">
            <option value="">Elegir Imagen</option>
            <option value="img1">Imagen 1</option>
            <option value="img2">Imagen 2</option>
            <option value="img3">Imagen 3</option>
          </select>

        </div>

        <div class="card-opcion">

          <div class="animal">🐱 Gato</div>

          <select id="r2">
            <option value="">Elegir Imagen</option>
            <option value="img1">Imagen 1</option>
            <option value="img2">Imagen 2</option>
            <option value="img3">Imagen 3</option>
          </select>

        </div>

        <div class="card-opcion">

          <div class="animal">🐭 Ratón</div>

          <select id="r3">
            <option value="">Elegir Imagen</option>
            <option value="img1">Imagen 1</option>
            <option value="img2">Imagen 2</option>
            <option value="img3">Imagen 3</option>
          </select>

        </div>

      </div>

      <!-- IMAGENES -->

      <div class="imagenes">

        <div class="imagen-card">
          <img src="img1.jpg" alt="Imagen 1">
          <div class="img-text">Imagen 1</div>
        </div>

        <div class="imagen-card">
          <img src="img2.jpg" alt="Imagen 2">
          <div class="img-text">Imagen 2</div>
        </div>

        <div class="imagen-card">
          <img src="img3.jpg" alt="Imagen 3">
          <div class="img-text">Imagen 3</div>
        </div>

      </div>

    </div>

    <div class="acciones">

      <button onclick="evaluar()">
        ENVIAR RESPUESTAS
      </button>

    </div>

  </div>

  <!-- MODAL -->

  <div class="modal" id="modal">

    <div class="modal-contenido">

      <h2>Resultado</h2>

      <p id="mensaje"></p>

      <button onclick="continuar()">
        SIGUIENTE
      </button>

    </div>

  </div>

  <script>

    // Mostrar jugador
    const nombre = localStorage.getItem("jugador");

    if(nombre){

      document.getElementById("jugador").innerHTML =
      "Jugador: <strong>" + nombre + "</strong>";

    }

    // Inicializar puntaje si no existe
    if(localStorage.getItem("puntaje") === null){

      localStorage.setItem("puntaje", 0);

    }

    function evaluar(){

      let puntos = 0;

      const r1 = document.getElementById("r1").value;
      const r2 = document.getElementById("r2").value;
      const r3 = document.getElementById("r3").value;

      // RESPUESTAS CORRECTAS

      if(r1 === "img1"){
        puntos++;
      }

      if(r2 === "img2"){
        puntos++;
      }

      if(r3 === "img3"){
        puntos++;
      }

      // Obtener puntaje actual
      let total = parseInt(localStorage.getItem("puntaje"));

      // Sumar puntos
      total += puntos;

      // Guardar nuevo total
      localStorage.setItem("puntaje", total);

      // Mostrar modal
      document.getElementById("modal").style.display = "flex";

      document.getElementById("mensaje").innerHTML =
      "Usted contestó correctamente <strong>" + puntos + "</strong> respuestas.<br><br>" +
      "Puntaje acumulado: <strong>" + total + "</strong>";

    }

    function continuar(){

      window.location.href = "j2.html";

    }

    // =========================
    // CRONOMETRO GLOBAL
    // =========================

    function actualizarCronometro(){

    }

    // Ejecutar inmediatamente
    actualizarCronometro();

    // Actualizar cada segundo

  </script>

</body>
</html>
