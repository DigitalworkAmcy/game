<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado Final</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      background:
      linear-gradient(rgba(15,23,42,0.92), rgba(30,41,59,0.95)),
      url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1920&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      color:white;
    }

    .container{
      width:100%;
      max-width:750px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:50px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
      color:#ffffff;
    }

    .jugador{
      font-size:1.3rem;
      color:#cbd5e1;
      margin-bottom:15px;
    }

    .cronometro{
      font-size:1.5rem;
      color:#93c5fd;
      margin-bottom:35px;
      font-weight:bold;
    }

    .resultado-box{
      background:rgba(255,255,255,0.08);
      border-radius:25px;
      padding:40px;
      margin-bottom:35px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .resultado-box h2{
      font-size:2rem;
      margin-bottom:20px;
      color:#93c5fd;
    }

    .puntaje{
      font-size:5rem;
      font-weight:bold;
      color:#ffffff;
      margin-bottom:15px;
    }

    .detalle{
      font-size:1.2rem;
      color:#dbeafe;
      line-height:1.8;
      margin-bottom:15px;
    }

    .mensaje-final{
      margin-top:20px;
      font-size:1.4rem;
      color:#f8fafc;
      font-weight:bold;
    }

    button{
      padding:16px 45px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(37,99,235,0.5);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 25px rgba(37,99,235,0.7);
    }

  </style>

</head>
<body>

  <div class="container">

    <h1>Resultado Final</h1>

    <div class="jugador" id="jugador"></div>

    <div class="cronometro" id="cronometro">
      Tiempo Total: 00:00
    </div>

    <div class="resultado-box">

      <h2>Puntaje Total</h2>

      <div class="puntaje" id="puntajeFinal">
        0
      </div>

      <div class="detalle">
        Resultado acumulado de todos los juegos completados.
      </div>

      <div class="detalle" id="tiempoFinal"></div>

      <div class="mensaje-final" id="mensajeFinal"></div>

    </div>

    <button onclick="reiniciarJuego()">
      VOLVER A JUGAR
    </button>

  </div>

  <script>

    // =========================
    // DATOS DEL JUGADOR
    // =========================

    const nombre = localStorage.getItem("jugador");

    const puntaje =
    parseInt(localStorage.getItem("puntaje")) || 0;

    // Mostrar jugador

    if(nombre){

      document.getElementById("jugador").innerHTML =
      "Jugador: <strong>" + nombre + "</strong>";

    }

    // Mostrar puntaje

    document.getElementById("puntajeFinal").innerHTML =
    puntaje;

    // =========================
    // MENSAJE SEGUN RESULTADO
    // =========================

    let mensaje = "";

    if(puntaje <= 2){

      mensaje = "Necesitas seguir practicando.";

    }else if(puntaje <= 4){

      mensaje = "Buen trabajo.";

    }else{

      mensaje = "Excelente resultado.";

    }

    document.getElementById("mensajeFinal").innerHTML =
    mensaje;

    // =========================
    // DETENER CRONOMETRO
    // =========================

    const inicio =
    localStorage.getItem("inicioTiempo");

    let tiempoFinal = 0;

    if(inicio){

      // Calculamos UNA sola vez el tiempo final
      tiempoFinal =
      Math.floor((Date.now() - inicio) / 1000);

      // Guardamos tiempo congelado
      localStorage.setItem("tiempoFinal", tiempoFinal);

    }

    // Recuperar tiempo congelado
    const tiempoGuardado =
    parseInt(localStorage.getItem("tiempoFinal")) || 0;

    // Convertir a minutos y segundos

    const minutos = Math.floor(tiempoGuardado / 60)
    .toString()
    .padStart(2, "0");

    const segundos = (tiempoGuardado % 60)
    .toString()
    .padStart(2, "0");

    // Mostrar cronometro detenido

    document.getElementById("cronometro").innerHTML =
    "Tiempo Total: " + minutos + ":" + segundos;

    document.getElementById("tiempoFinal").innerHTML =
    "Tiempo empleado: <strong>" +
    minutos + ":" + segundos +
    "</strong>";

    // =========================
    // REINICIAR
    // =========================

    function reiniciarJuego(){

      // Limpiar tiempo final anterior
      localStorage.removeItem("tiempoFinal");

      // Volver al inicio
      window.location.href = "index.html";

    }

  </script>

</body>
</html>
